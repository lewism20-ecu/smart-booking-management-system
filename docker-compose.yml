version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sbms-db
    environment:
      POSTGRES_DB: sbms
      POSTGRES_USER: sbms_user
      POSTGRES_PASSWORD: LocalPass123!
    ports:
      - "5432:5432"
    volumes:
      - sbms_data:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbms_user -d sbms"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sbms-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  sbms_data: